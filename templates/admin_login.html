<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Hakeem Inventory</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: var(--bg-main) !important;
            color: var(--text-primary) !important;
        }
        .auth-card {
            background-color: var(--bg-card) !important;
            border-color: var(--border-color) !important;
        }
        .brand-logo {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
        }
        .form-control, .input-group-text {
            background-color: var(--bg-main) !important;
            border-color: var(--border-color) !important;
            color: var(--text-primary) !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <div class="brand-logo">
                            <i class="fas fa-shield-halved"></i>
                        </div>
                        <h4 class="fw-bold mb-1" style="color: #f8fafc;">Admin Portal</h4>
                        <p class="small" style="color: #94a3b8;">Restricted Access Authentication</p>
                    </div>

                    <!-- Flash Messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show border-0 shadow-sm py-2 mb-4 text-dark"
                        role="alert" style="border-radius: 8px; font-size: 0.9rem;">
                        <div class="d-flex align-items-center">
                            <i
                                class="fas fa-{{ 'exclamation-circle' if category == 'error' or category == 'danger' else 'check-circle' }} me-2"></i>
                            <span>{{ message }}</span>
                        </div>
                        <button type="button" class="btn-close py-2" data-bs-dismiss="alert"
                            aria-label="Close"></button>
                    </div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('admin_login') }}">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold" style="color: #cbd5e1;">Admin ID or
                                Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0"
                                    placeholder="admin@example.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-semibold" style="color: #cbd5e1;">Admin Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" id="password"
                                    class="form-control border-start-0 border-end-0 ps-0"
                                    placeholder="Enter secure password" required>
                                <span class="input-group-text password-toggle border-start-0"
                                    onclick="togglePassword()">
                                    <i class="far fa-eye" id="toggleIcon"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">Authorize Access</button>

                        <div class="text-center mt-4">
                            <p class="small mb-0" style="color: #64748b;">Not an Admin? <a href="{{ url_for('login') }}"
                                    class="fw-semibold text-decoration-none" style="color: #3b82f6;">Staff Login</a></p>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-4 small" style="color: #475569;">
                    &copy; 2026 Admin Systems | <span class="text-danger"><i class="fas fa-exclamation-triangle"></i>
                        Authorized Only</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Initialize Theme System from localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.classList.remove('light-theme', 'dark-theme');
        document.body.classList.add(`${savedTheme}-theme`);
    </script>
</body>

</html>
